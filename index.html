<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR.js Image Tracking</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #000;
      }
      #ar-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
      }
      #status-msg {
        display: block;
        opacity: 0;
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 200, 100, 0.85);
        color: #fff;
        font-family: sans-serif;
        font-size: 18px;
        font-weight: bold;
        padding: 10px 28px;
        border-radius: 30px;
        letter-spacing: 1px;
        z-index: 999;
        pointer-events: none;
        transition: none;
      }
    </style>
  </head>
  <body>
    <div id="ar-container"></div>
    <div id="status-msg">✅ 이미지 인식 성공!</div>

    <!-- Three.js r128 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="js/ar-threex.js"></script>
    <script src="js/main.js?v=ar-meshfix-step2"></script>
  </body>
</html>
