<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR.js Image Tracking</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #000;
      }
      #ar-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
      }
      #status-msg {
        display: block;
        opacity: 0;
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 200, 100, 0.85);
        color: #fff;
        font-family: sans-serif;
        font-size: 18px;
        font-weight: bold;
        padding: 10px 28px;
        border-radius: 30px;
        letter-spacing: 1px;
        z-index: 999;
        pointer-events: none;
        transition: none;
      }
      #ctrl-panel {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        gap: 8px;
        background: rgba(0, 0, 0, 0.75);
        padding: 16px 24px;
        border-radius: 20px;
        z-index: 999;
        user-select: none;
        min-width: 280px;
      }
      .ctrl-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .ctrl-row label {
        color: #aaa;
        font-family: sans-serif;
        font-size: 12px;
        font-weight: bold;
        width: 14px;
        text-align: center;
        flex-shrink: 0;
      }
      .ctrl-row label.lbl-scale { color: #fff; }
      .ctrl-row label.lbl-x     { color: #ff6b6b; }
      .ctrl-row label.lbl-y     { color: #6bffb0; }
      .ctrl-row label.lbl-z     { color: #6bb8ff; }
      .ctrl-row label.lbl-rx    { color: #ffcf5a; }
      .ctrl-row label.lbl-ry    { color: #d37bff; }
      .ctrl-row label.lbl-rz    { color: #52d9ff; }
      .ctrl-slider {
        -webkit-appearance: none;
        appearance: none;
        flex: 1;
        height: 4px;
        border-radius: 2px;
        background: rgba(255,255,255,0.2);
        outline: none;
        cursor: pointer;
      }
      .ctrl-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 4px rgba(0,0,0,0.5);
      }
      .ctrl-val {
        color: #fff;
        font-family: monospace;
        font-size: 13px;
        min-width: 46px;
        text-align: right;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div id="ar-container"></div>
    <div id="status-msg">✅ 이미지 인식 성공!</div>
    <div id="ctrl-panel">
      <div class="ctrl-row">
        <label class="lbl-scale">S</label>
        <input class="ctrl-slider" id="scale-slider" type="range" min="0.1" max="120.0" step="0.05" value="0.10" />
        <span class="ctrl-val" id="scale-value">0.10</span>
      </div>
      <div class="ctrl-row">
        <label class="lbl-x">X</label>
        <input class="ctrl-slider" id="x-slider" type="range" min="-500" max="500" step="0.05" value="-97.00" />
        <span class="ctrl-val" id="x-value">-97.00</span>
      </div>
      <div class="ctrl-row">
        <label class="lbl-y">Y</label>
        <input class="ctrl-slider" id="y-slider" type="range" min="-500" max="500" step="0.05" value="134.35" />
        <span class="ctrl-val" id="y-value">134.35</span>
      </div>
      <div class="ctrl-row">
        <label class="lbl-z">Z</label>
        <input class="ctrl-slider" id="z-slider" type="range" min="-500" max="500" step="0.05" value="-118.30" />
        <span class="ctrl-val" id="z-value">-118.30</span>
      </div>
      <div class="ctrl-row">
        <label class="lbl-rx">Rx</label>
        <input class="ctrl-slider" id="rx-slider" type="range" min="-180" max="180" step="1" value="24" />
        <span class="ctrl-val" id="rx-value">24</span>
      </div>
      <div class="ctrl-row">
        <label class="lbl-ry">Ry</label>
        <input class="ctrl-slider" id="ry-slider" type="range" min="-180" max="180" step="1" value="8" />
        <span class="ctrl-val" id="ry-value">8</span>
      </div>
      <div class="ctrl-row">
        <label class="lbl-rz">Rz</label>
        <input class="ctrl-slider" id="rz-slider" type="range" min="-180" max="180" step="1" value="0" />
        <span class="ctrl-val" id="rz-value">0</span>
      </div>
    </div>

    <!-- Three.js r128 (AR.js 호환 안정 버전) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

    <!-- GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <!-- AR.js NFT (이미지 트래킹) — 로컬 파일로 안정 로드 -->
    <script src="js/ar-threex.js"></script>

    <!-- 메인 스크립트 -->
    <script src="js/main.js?v=idlefix-1"></script>
  </body>
</html>
